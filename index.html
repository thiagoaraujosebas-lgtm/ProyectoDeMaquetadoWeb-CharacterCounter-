<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="Icon" href="./assets/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <div class="logo">
                <img src="./assets/icon.png" alt="Imagen del logo">
                <h1>Character Counter</h1>
            </div>
            <button class="settings-btn" aria-label="Configuration">&#9788; </button>
        </header>
        <section class="hero-section">
            <h2>Analyze your text <span class="sub-title">in real-time</span></h2>>
            <div class="textarea-container">
                <textarea name="text-input" id="text-input" placeholder="Type or paste your text here">Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly</textarea>
            </div>
            <div class="controls-container">
                <div class="checkbox-group">
                    <label class="control-label">
                        <input type="checkbox" id="exclude-space">
                        Exclude spaces
                    </label>
                       <label class="control-label">
                            <input type="checkbox" id="set-limit">
                            Set Character Limit
                     </label>
                </div>
                <span class="reading-time">Approx. reading time:&lt;1 minut</span>
            </div>
        </section>
    </div>
</body>
</html>
